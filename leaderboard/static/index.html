<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Alpha Chat 📈 — Leaderboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0a0c10;
      --panel:   #12151b;
      --panel2:  #171b22;
      --border:  #1f242c;
      --text:    #e8eaed;
      --dim:     #8b93a1;
      --muted:   #5b6472;
      --green:   #34d399;
      --red:     #f87171;
      --mono:    'IBM Plex Mono', monospace;
      --sans:    'Sora', sans-serif;
    }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
    }
    ::selection { background: #34d39944; }
    @keyframes pulseDot { 0%,100%{opacity:1} 50%{opacity:.3} }
    button { font-family: var(--sans); }
    a { color: var(--green); }

    /* ── App shell ────────────────────────────────────────────────────────── */
    #app { padding: 32px 40px 56px; max-width: 1320px; margin: 0 auto; }

    /* ── Header ───────────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 24px;
      flex-wrap: wrap;
    }
    .live-badge { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .live-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--green);
      animation: pulseDot 1.8s ease-in-out infinite;
    }
    .live-text {
      font-size: 13px; color: var(--dim);
      letter-spacing: .08em; text-transform: uppercase; font-weight: 600;
    }
    h1 { font-size: 32px; font-weight: 800; letter-spacing: -.02em; margin-bottom: 4px; }
    .subtitle { color: var(--dim); font-size: 14.5px; }

    .time-filters {
      display: flex; gap: 6px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 12px; padding: 4px;
    }
    .tf-btn {
      border: none; background: transparent; color: var(--muted);
      font-family: var(--mono); font-size: 13px; font-weight: 600;
      padding: 8px 16px; border-radius: 8px; cursor: pointer;
      transition: all .15s;
    }
    .tf-btn.active   { background: #262c36; color: var(--text); }
    .tf-btn:hover:not(.active) { color: var(--dim); background: #1a1f2744; }

    /* ── Grid ─────────────────────────────────────────────────────────────── */
    .main-grid {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 20px;
      align-items: start;
    }

    /* ── Generic panel ────────────────────────────────────────────────────── */
    .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 16px; }

    /* ── Chart panel ──────────────────────────────────────────────────────── */
    .chart-panel { padding: 24px 24px 20px; margin-bottom: 20px; }
    .chart-top {
      display: flex; align-items: center;
      justify-content: space-between;
      flex-wrap: wrap; gap: 14px; margin-bottom: 14px;
    }
    .chart-top-left { display: flex; align-items: center; gap: 12px; }
    .chart-top h2 { font-size: 16px; font-weight: 700; }
    .mode-toggle {
      display: flex; gap: 4px;
      background: #0d1015; border: 1px solid var(--border);
      border-radius: 8px; padding: 3px;
    }
    .mode-btn {
      border: none; background: transparent; color: var(--muted);
      font-family: var(--mono); font-size: 12px; font-weight: 700;
      padding: 5px 12px; border-radius: 6px; cursor: pointer; transition: all .15s;
    }
    .mode-btn.active { background: #262c36; color: var(--text); }
    .legend-chips { display: flex; gap: 8px; flex-wrap: wrap; }
    .chip {
      display: flex; align-items: center; gap: 6px;
      background: transparent; border: 1px solid var(--border);
      border-radius: 20px; padding: 4px 10px 4px 6px;
      cursor: pointer; transition: opacity .15s;
    }
    .chip.off { opacity: .3; }
    .chip-dot {
      width: 16px; height: 16px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 8.5px; font-weight: 800; color: #0a0c10; flex-shrink: 0;
    }
    .chip-name { font-size: 12px; font-weight: 600; color: var(--text); }
    .chart-wrap { position: relative; height: 300px; }
    #chart { display: block; }

    /* ── Feed panel ───────────────────────────────────────────────────────── */
    .feed-panel { overflow: hidden; }
    .feed-hdr { padding: 14px 16px 8px; border-bottom: 1px solid var(--border); }
    .feed-hdr h2 { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
    .feed-hdr p  { font-size: 12px; color: var(--muted); }
    .feed-list   { max-height: 280px; overflow-y: auto; padding: 6px 0; }
    .feed-item {
      display: flex; gap: 12px;
      padding: 11px 16px; margin: 2px 8px;
      border-radius: 12px; cursor: pointer;
      border: 1px solid transparent; transition: all .12s;
    }
    .feed-item:hover { border-color: var(--border); background: var(--panel2); }
    .avatar {
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; flex-shrink: 0;
    }
    .feed-avatar { width: 32px; height: 32px; font-size: 11.5px; }
    .feed-body   { flex: 1; min-width: 0; }
    .feed-title  { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .feed-ticker { font-size: 13px; font-weight: 700; }
    .feed-meta   { font-size: 11.5px; color: var(--muted); }
    .feed-quote  {
      font-size: 12.5px; color: #a8afba; margin-top: 2px;
      font-style: italic; white-space: nowrap;
      overflow: hidden; text-overflow: ellipsis;
    }
    .feed-ret { text-align: right; flex-shrink: 0; font-family: var(--mono); font-weight: 700; font-size: 13px; }

    /* ── Sidebar ──────────────────────────────────────────────────────────── */
    .sidebar {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 16px; padding: 8px;
      position: sticky; top: 20px;
    }
    .sidebar-hdr { padding: 16px 16px 8px; }
    .sidebar-hdr h2 { font-size: 16px; font-weight: 700; margin-bottom: 2px; }
    .sidebar-hdr p  { font-size: 11.5px; color: var(--muted); font-family: var(--mono); }
    .lb-row {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; margin: 2px 8px;
      border-radius: 12px; cursor: pointer;
      border: 1px solid transparent; transition: all .12s;
    }
    .lb-row:hover { background: var(--panel2); border-color: var(--border); }
    .lb-rank { width: 20px; font-family: var(--mono); font-size: 13px; font-weight: 700; text-align: center; flex-shrink: 0; }
    .lb-avatar { width: 36px; height: 36px; font-size: 12.5px; }
    .lb-info { flex: 1; min-width: 0; }
    .lb-name { font-size: 13.5px; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .lb-streak { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .lb-stats { text-align: right; flex-shrink: 0; }
    .lb-pnl { font-family: var(--mono); font-weight: 700; font-size: 14px; }
    .lb-count { font-size: 10.5px; color: var(--muted); }

    /* ── Drawer ───────────────────────────────────────────────────────────── */
    #overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.6); backdrop-filter: blur(2px);
      z-index: 40; display: none;
    }
    #overlay.open { display: block; }
    #drawer {
      position: fixed; top: 0; right: 0;
      height: 100vh; width: 420px; max-width: 92vw;
      background: var(--panel); border-left: 1px solid var(--border);
      z-index: 41; overflow-y: auto;
      padding: 28px 24px 48px;
      box-shadow: -20px 0 60px rgba(0,0,0,.45);
      transform: translateX(100%); transition: transform .25s ease;
    }
    #overlay.open #drawer { transform: translateX(0); }
    .drawer-top {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 20px;
    }
    .drawer-user { display: flex; align-items: center; gap: 14px; }
    .drawer-avatar { width: 52px; height: 52px; font-size: 17px; }
    .drawer-name { font-size: 17px; font-weight: 800; }
    .drawer-nick { font-size: 13px; color: var(--dim); }
    .close-btn {
      background: #1a1f27; border: 1px solid #262c36; color: var(--dim);
      width: 30px; height: 30px; border-radius: 8px; cursor: pointer;
      font-size: 18px; line-height: 1; display: flex; align-items: center; justify-content: center;
    }
    .stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 24px; }
    .stat-box { background: var(--panel2); border: 1px solid var(--border); border-radius: 10px; padding: 12px; text-align: center; }
    .stat-val { font-family: var(--mono); font-weight: 700; font-size: 17px; }
    .stat-lbl { font-size: 10.5px; color: var(--muted); margin-top: 2px; text-transform: uppercase; letter-spacing: .04em; }
    .section-lbl { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 10px; }
    .pitch-card { border-radius: 14px; padding: 16px; margin-bottom: 26px; }
    .pitch-top { display: flex; justify-content: space-between; align-items: center; }
    .pitch-ticker { font-size: 16px; font-weight: 800; }
    .pitch-ret { font-family: var(--mono); font-weight: 700; font-size: 15px; }
    .pitch-meta { display: flex; gap: 16px; margin-top: 8px; font-family: var(--mono); font-size: 12.5px; color: var(--dim); }
    .pitch-quote { margin-top: 10px; font-size: 13px; color: #c3c9d1; font-style: italic; line-height: 1.5; }
    .hist-item { padding: 12px 0; border-bottom: 1px solid var(--border); }
    .hist-top { display: flex; justify-content: space-between; align-items: center; }
    .hist-ticker { font-size: 14px; font-weight: 700; }
    .hist-ret { font-family: var(--mono); font-weight: 700; font-size: 13px; }
    .hist-meta { font-size: 11.5px; color: var(--muted); margin-top: 2px; }
    .hist-quote { font-size: 12.5px; color: var(--dim); font-style: italic; margin-top: 4px; }

    /* ── Utility ──────────────────────────────────────────────────────────── */
    .pos { color: var(--green); }
    .neg { color: var(--red); }
    .empty { padding: 48px 16px; text-align: center; color: var(--muted); font-size: 14px; line-height: 1.6; }

    /* ── Tablet ───────────────────────────────────────────────────────────── */
    @media (max-width: 820px) {
      #app { padding: 20px 20px 48px; }
      .main-grid { grid-template-columns: 1fr; }
      .sidebar { position: static; }
      h1 { font-size: 26px; }
      .header { align-items: flex-start; flex-direction: column; gap: 14px; }
      .feed-list { max-height: 380px; }
    }

    /* ── Phone ────────────────────────────────────────────────────────────── */
    @media (max-width: 540px) {
      #app { padding: 14px 12px 48px; }
      h1 { font-size: 21px; }
      .subtitle { font-size: 12.5px; }
      .header { gap: 10px; margin-bottom: 16px; }

      /* Time filters */
      .time-filters { padding: 3px; gap: 3px; }
      .tf-btn { padding: 6px 11px; font-size: 12px; border-radius: 7px; }

      /* Chart panel */
      .chart-panel { padding: 14px 12px 10px; margin-bottom: 14px; }
      .chart-top { flex-direction: column; align-items: flex-start; gap: 10px; }
      .chart-top-left { flex-wrap: wrap; gap: 8px; }
      .chart-top h2 { font-size: 14px; }
      .chart-wrap { height: 180px; }

      /* Legend chips — horizontal scroll, no wrap */
      .legend-chips {
        flex-wrap: nowrap;
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
        padding-bottom: 4px;
        scrollbar-width: none;
      }
      .legend-chips::-webkit-scrollbar { display: none; }
      .chip { flex-shrink: 0; padding: 4px 9px 4px 5px; }
      .chip-name { font-size: 11.5px; }
      .chip-dot { width: 14px; height: 14px; font-size: 7.5px; }

      /* Feed */
      .feed-hdr { padding: 12px 14px 8px; }
      .feed-hdr h2 { font-size: 14px; }
      .feed-hdr p  { font-size: 11px; }
      .feed-list { max-height: 300px; }
      .feed-item { padding: 9px 12px; margin: 2px 4px; gap: 9px; }
      .feed-avatar { width: 28px; height: 28px; font-size: 10.5px; }
      .feed-ticker { font-size: 12.5px; }
      .feed-meta { font-size: 10.5px; }
      .feed-quote { font-size: 11.5px; }
      .feed-ret { font-size: 12px; }

      /* Leaderboard sidebar */
      .sidebar { padding: 4px; }
      .sidebar-hdr { padding: 12px 12px 6px; }
      .sidebar-hdr h2 { font-size: 14px; }
      .sidebar-hdr p { font-size: 10.5px; }
      .lb-row { padding: 9px 10px; margin: 2px 4px; gap: 8px; }
      .lb-rank { font-size: 12px; width: 18px; }
      .lb-avatar { width: 30px; height: 30px; font-size: 10.5px; }
      .lb-name { font-size: 12.5px; }
      .lb-streak { font-size: 10px; }
      .lb-pnl { font-size: 13px; }
      .lb-count { font-size: 10px; }

      /* Drawer — full screen on mobile */
      #drawer {
        width: 100vw;
        max-width: 100vw;
        padding: 20px 16px 48px;
        border-left: none;
        border-top: 1px solid var(--border);
      }
      .drawer-avatar { width: 44px; height: 44px; font-size: 14px; }
      .drawer-name { font-size: 15px; }
      .drawer-nick { font-size: 12px; }
      .stat-grid { gap: 6px; }
      .stat-box { padding: 10px 8px; }
      .stat-val { font-size: 14px; }
      .stat-lbl { font-size: 9.5px; }
      .pitch-ticker { font-size: 14px; }
      .pitch-ret { font-size: 13.5px; }
      .pitch-meta { font-size: 11.5px; gap: 10px; }
    }
  </style>
</head>
<body>
<div id="app">

  <!-- Header -->
  <div class="header">
    <div>
      <div class="live-badge">
        <span class="live-dot"></span>
        <span class="live-text">Live simulation</span>
      </div>
      <h1>Alpha Chat 📈</h1>
      <p class="subtitle">Friends drop stock calls in Telegram — the bot auto-sims the trade. This is who's actually printing.</p>
    </div>
    <div class="time-filters">
      <button class="tf-btn" data-tf="1W" onclick="setTF('1W')">1W</button>
      <button class="tf-btn" data-tf="1M" onclick="setTF('1M')">1M</button>
      <button class="tf-btn active" data-tf="ALL" onclick="setTF('ALL')">ALL</button>
    </div>
  </div>

  <!-- Main grid -->
  <div class="main-grid">

    <!-- Left column -->
    <div>
      <!-- Chart -->
      <div class="panel chart-panel">
        <div class="chart-top">
          <div class="chart-top-left">
            <h2>Performance by trader</h2>
            <div class="mode-toggle">
              <button class="mode-btn active" data-mode="$" onclick="setMode('$')">$</button>
              <button class="mode-btn" data-mode="%" onclick="setMode('%')">%</button>
            </div>
          </div>
          <div class="legend-chips" id="chips"></div>
        </div>
        <div class="chart-wrap">
          <canvas id="chart"></canvas>
        </div>
      </div>

      <!-- Feed -->
      <div class="panel feed-panel">
        <div class="feed-hdr">
          <h2>Idea feed</h2>
          <p>every call posted to the chat, most recent first</p>
        </div>
        <div class="feed-list" id="feed"></div>
      </div>
    </div>

    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-hdr">
        <h2>Leaderboard</h2>
        <p>ranked by total return</p>
      </div>
      <div id="lb"></div>
    </div>

  </div>
</div>

<!-- Drawer overlay -->
<div id="overlay" onclick="handleOverlay(event)">
  <div id="drawer" onclick="event.stopPropagation()">
    <div id="drawer-body"></div>
  </div>
</div>

<script>
// ── Avatar helper ─────────────────────────────────────────────────────────────
// Returns an HTML string for a circular avatar — photo if available, else initials.
// cls  : CSS size class (feed-avatar, lb-avatar, drawer-avatar)
// obj  : object with {photo_url, initials, color}
// bw   : border width in px (default 1.5)
function avatarEl(obj, cls, bw = 1.5) {
  const border = `${bw}px solid ${obj.color}`;
  const initDiv = `<div class="avatar ${cls}" style="background:${obj.color}22;border:${border};color:${obj.color}">${obj.initials}</div>`;
  if (!obj.photo_url) return initDiv;
  return `<div class="avatar ${cls}" style="border:${border};overflow:hidden;padding:0;background:${obj.color}22">` +
    `<img src="${obj.photo_url}" alt="" style="width:100%;height:100%;object-fit:cover;display:block" ` +
    `onerror="this.parentElement.style.padding='';this.parentElement.innerHTML='${obj.initials}'">` +
    `</div>`;
}

// ── State ──────────────────────────────────────────────────────────────────────
const S = {
  data:      null,   // API response {users, feed}
  tf:        'ALL',  // '1W' | '1M' | 'ALL'
  mode:      '$',    // '$' | '%'
  hidden:    new Set(),
  drawer:    null,   // telegram_user_id | null
  chart:     null,
};

// ── Constants ─────────────────────────────────────────────────────────────────
const EMOJI = {
  BTC:'₿', ETH:'⟠', SOL:'◎', DOGE:'🐕', XRP:'💧',
  AAPL:'🍎', TSLA:'🚗', NVDA:'💻', MSFT:'☁️', AMZN:'📦',
  META:'📱', GOOGL:'🔍', GOOG:'🔍', NFLX:'🎬', AMD:'💻',
  MSTR:'₿', COIN:'💰', GME:'🎮', AMC:'🎬', PLTR:'🛰️',
  RIVN:'🚗', NIO:'🚗', SNAP:'📱', MARA:'⛏️', RIOT:'⛏️',
  ARM:'💻', SMCI:'🖥️', NOW:'☁️', UBER:'🚗', HOOD:'📊',
  RBLX:'🎮', SPOT:'🎵', DIS:'🏰', BA:'✈️', F:'🚗',
};

function tEmoji(ticker, dir) {
  return EMOJI[ticker] || (dir === 'long' ? '📈' : '📉');
}

function timeAgo(iso) {
  if (!iso) return '';
  const d = new Date(iso), now = new Date();
  const days = Math.floor((now - d) / 864e5);
  if (days === 0) return 'today';
  if (days === 1) return '1d ago';
  if (days < 7)  return days + 'd ago';
  if (days < 31) return Math.floor(days / 7) + 'w ago';
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
}

function fmtPnl(v) {
  if (v == null) return '—';
  return (v >= 0 ? '+$' : '-$') + Math.abs(v).toFixed(2);
}
function fmtPct(v) {
  if (v == null) return '—';
  return (v >= 0 ? '+' : '') + v.toFixed(1) + '%';
}
function pnlCls(v) { return v == null ? '' : v >= 0 ? 'pos' : 'neg'; }
function pnlColor(v) { return v == null ? '#8b93a1' : v >= 0 ? '#34d399' : '#f87171'; }

function firstName(name) { return (name || '').trim().split(' ')[0]; }

function streakLabel(n) {
  if (!n) return '—';
  return n > 0 ? `🔥 ${n} win streak` : `${Math.abs(n)} loss streak`;
}

function xLabel(dateStr) {
  if (!dateStr) return '';
  const d = new Date(dateStr + 'T00:00:00');
  return d.toLocaleDateString('en-US', {month:'short', day:'numeric'});
}

// ── Chart plugins ─────────────────────────────────────────────────────────────
const zeroPlugin = {
  id: 'zeroLine',
  beforeDatasetsDraw(chart) {
    const {ctx, chartArea: ca, scales: {y}} = chart;
    if (!ca || !y) return;
    const y0 = y.getPixelForValue(0);
    if (y0 < ca.top || y0 > ca.bottom) return;
    ctx.save();
    ctx.strokeStyle = '#3a4250';
    ctx.lineWidth = 2;
    ctx.setLineDash([7, 9]);
    ctx.beginPath();
    ctx.moveTo(ca.left, y0);
    ctx.lineTo(ca.right, y0);
    ctx.stroke();
    ctx.setLineDash([]);
    ctx.restore();
  }
};

const endLabelPlugin = {
  id: 'endLabels',
  afterDraw(chart) {
    if (window.innerWidth <= 540) return;
    if (!S.data) return;
    const {ctx, chartArea: ca} = chart;
    if (!ca) return;

    // Collect last visible point per dataset
    const pts = [];
    chart.data.datasets.forEach((ds, i) => {
      const meta = chart.getDatasetMeta(i);
      if (meta.hidden) return;
      let last = null;
      for (let j = meta.data.length - 1; j >= 0; j--) {
        const pt = meta.data[j];
        if (pt && isFinite(pt.y)) { last = pt; break; }
      }
      if (!last) return;
      const user = S.data.users.find(u => u.display_name === ds.label);
      if (!user) return;
      pts.push({y: last.y, user, color: ds.borderColor});
    });
    if (!pts.length) return;

    // Spread labels vertically to avoid overlap
    pts.sort((a, b) => a.y - b.y);
    const GAP = 26;
    for (let pass = 0; pass < 40; pass++) {
      let moved = false;
      for (let k = 1; k < pts.length; k++) {
        if (pts[k].y - pts[k-1].y < GAP) {
          const mid = (pts[k-1].y + pts[k].y) / 2;
          pts[k-1].y = Math.max(ca.top + 12, mid - GAP / 2);
          pts[k].y   = Math.min(ca.bottom - 8, mid + GAP / 2);
          moved = true;
        }
      }
      if (!moved) break;
    }

    ctx.save();
    pts.forEach(({y, user, color}) => {
      const x = ca.right + 8;

      // Avatar circle
      ctx.fillStyle = color;
      ctx.beginPath();
      ctx.arc(x + 12, y, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#0a0c10';
      ctx.font = 'bold 8.5px IBM Plex Mono, monospace';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(user.initials, x + 12, y);

      // P&L text
      let label;
      if (S.mode === '%') {
        const notional = Math.max((user.idea_count || 0) * 1000, 1000);
        const pct = (user.pnl / notional) * 100;
        label = (pct >= 0 ? '+' : '') + pct.toFixed(1) + '%';
      } else {
        label = (user.pnl >= 0 ? '+$' : '-$') + Math.abs(user.pnl).toFixed(0);
      }
      ctx.fillStyle = pnlColor(user.pnl);
      ctx.font = 'bold 11px IBM Plex Mono, monospace';
      ctx.textAlign = 'left';
      ctx.fillText(label, x + 28, y);
    });
    ctx.restore();
  }
};

// ── Chart data builder ────────────────────────────────────────────────────────
function buildChartData() {
  const {data, tf, mode, hidden} = S;

  // Union of all dates across all users, sorted ascending
  const dateSet = new Set();
  data.users.forEach(u => u.equity_curve.forEach(p => dateSet.add(p.date)));
  let dates = [...dateSet].sort();

  if (tf === '1W') dates = dates.slice(-7);
  if (tf === '1M') dates = dates.slice(-30);

  const datasets = data.users.map(u => {
    const byDate = {};
    u.equity_curve.forEach(p => { byDate[p.date] = p.equity; });
    let vals = dates.map(d => byDate[d] ?? null);

    if (mode === '%') {
      // Percentage return on total deployed notional
      const notional = Math.max((u.idea_count || 0) * 1000, 1000);
      vals = vals.map(v => v != null ? (v / notional) * 100 : null);
    }

    return {
      label:           u.display_name,
      data:            vals,
      borderColor:     u.color,
      backgroundColor: 'transparent',
      tension:         0.3,
      pointRadius:     0,
      borderWidth:     2.5,
      spanGaps:        true,
      hidden:          hidden.has(u.telegram_user_id),
    };
  });

  return {labels: dates, datasets};
}

function initChart() {
  if (S.chart) S.chart.destroy();
  const ctx = document.getElementById('chart').getContext('2d');
  const {labels, datasets} = buildChartData();
  const isMobile = window.innerWidth <= 540;

  S.chart = new Chart(ctx, {
    type: 'line',
    data: {labels, datasets},
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: {duration: 350},
      interaction: {mode: 'index', intersect: false},
      layout: {padding: {right: isMobile ? 8 : 130, left: 2, top: 10, bottom: 4}},
      plugins: {
        legend: {display: false},
        tooltip: {
          backgroundColor: '#1a1f27',
          borderColor: '#262c36',
          borderWidth: 1,
          titleColor: '#e8eaed',
          bodyColor: '#8b93a1',
          titleFont: {family: 'Sora, sans-serif', weight: '700', size: 13},
          bodyFont: {family: 'IBM Plex Mono, monospace', size: 12},
          padding: 12,
          callbacks: {
            title(items) { return xLabel(items[0]?.label); },
            label(ctx) {
              const v = ctx.parsed.y;
              if (v == null) return null;
              const name = ctx.dataset.label;
              if (S.mode === '%') return ` ${name}: ${v >= 0 ? '+' : ''}${v.toFixed(2)}%`;
              return ` ${name}: ${v >= 0 ? '+$' : '-$'}${Math.abs(v).toFixed(2)}`;
            }
          }
        }
      },
      scales: {
        x: {
          ticks: {
            color: '#5b6472',
            font: {family: 'IBM Plex Mono, monospace', size: 11},
            maxTicksLimit: 6,
            maxRotation: 0,
            callback(val) { return xLabel(this.getLabelForValue(val)); }
          },
          grid: {color: '#1f242c', lineWidth: 1.5},
          border: {color: '#1f242c'},
        },
        y: {
          ticks: {
            color: '#8b93a1',
            font: {family: 'IBM Plex Mono, monospace', size: 12, weight: '600'},
            callback(v) {
              if (S.mode === '%') return (v >= 0 ? '+' : '') + v.toFixed(1) + '%';
              return (v >= 0 ? '+$' : '-$') + Math.abs(v).toFixed(0);
            }
          },
          grid: {color: '#1f242c', lineWidth: 1.5},
          border: {color: '#1f242c'},
        }
      }
    },
    plugins: [zeroPlugin, endLabelPlugin],
  });
}

function refreshChart() {
  if (!S.chart) return;
  const {labels, datasets} = buildChartData();
  S.chart.data.labels = labels;
  S.chart.data.datasets = datasets;
  S.chart.update();
}

// ── Controls ──────────────────────────────────────────────────────────────────
function setTF(tf) {
  S.tf = tf;
  document.querySelectorAll('.tf-btn').forEach(b => b.classList.toggle('active', b.dataset.tf === tf));
  refreshChart();
}

function setMode(m) {
  S.mode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
  refreshChart();
}

function toggleUser(uid) {
  if (S.hidden.has(uid)) S.hidden.delete(uid); else S.hidden.add(uid);
  document.querySelectorAll('.chip').forEach(el => {
    if (el.dataset.uid === uid) el.classList.toggle('off', S.hidden.has(uid));
  });
  refreshChart();
}

// ── Rendering ─────────────────────────────────────────────────────────────────
function renderChips() {
  const el = document.getElementById('chips');
  el.innerHTML = '';
  S.data.users.forEach(u => {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.dataset.uid = u.telegram_user_id;
    btn.onclick = () => toggleUser(u.telegram_user_id);
    btn.innerHTML = `
      <span class="chip-dot" style="background:${u.color}">${u.initials}</span>
      <span class="chip-name">${firstName(u.display_name)}</span>`;
    el.appendChild(btn);
  });
}

function renderLeaderboard() {
  const el = document.getElementById('lb');
  if (!S.data.users.length) {
    el.innerHTML = '<div class="empty">No data yet.<br>Post a trade idea in Telegram to get started!</div>';
    return;
  }
  const medals = ['🥇','🥈','🥉'];
  const rankColors = ['#fbbf24','#94a3b8','#cd7f32'];
  el.innerHTML = S.data.users.map(u => {
    const rl = medals[u.rank - 1] || u.rank;
    const rc = rankColors[u.rank - 1] || '#5b6472';
    return `
      <div class="lb-row" onclick="openDrawer('${u.telegram_user_id}')">
        <div class="lb-rank" style="color:${rc}">${rl}</div>
        ${avatarEl(u, 'lb-avatar')}
        <div class="lb-info">
          <div class="lb-name">${u.display_name}</div>
          <div class="lb-streak">${streakLabel(u.streak)}</div>
        </div>
        <div class="lb-stats">
          <div class="lb-pnl ${pnlCls(u.pnl)}">${fmtPnl(u.pnl)}</div>
          <div class="lb-count">${u.idea_count} calls</div>
        </div>
      </div>`;
  }).join('');
}

function renderFeed() {
  const el = document.getElementById('feed');
  if (!S.data.feed.length) {
    el.innerHTML = '<div class="empty">No ideas posted yet.</div>';
    return;
  }
  el.innerHTML = S.data.feed.map(it => {
    const em = tEmoji(it.ticker, it.direction);
    const label = it.company_name || it.ticker || '?';
    return `
      <div class="feed-item" onclick="openDrawer('${it.telegram_user_id}')">
        ${avatarEl(it, 'feed-avatar')}
        <div class="feed-body">
          <div class="feed-title">
            <span class="feed-ticker">${em} ${label}</span>
            <span class="feed-meta">${firstName(it.display_name)} · ${timeAgo(it.submitted_at)}</span>
          </div>
          <div class="feed-quote">"${it.raw_text || '...'}"</div>
        </div>
        <div class="feed-ret ${pnlCls(it.pnl_usd)}">${fmtPnl(it.pnl_usd)}</div>
      </div>`;
  }).join('');
}

// ── Drawer ────────────────────────────────────────────────────────────────────
function openDrawer(uid) {
  S.drawer = uid;
  const user = S.data.users.find(u => u.telegram_user_id === uid);
  if (!user) return;

  const userFeed = S.data.feed.filter(f => f.telegram_user_id === uid);
  const pitch   = userFeed.find(f => f.status === 'open') || userFeed[0];
  const history = userFeed.filter(f => f !== pitch).slice(0, 8);

  const winPct  = (user.win_rate * 100).toFixed(0) + '%';
  const strEmoji = user.streak >= 3 ? '🔥'.repeat(Math.min(user.streak, 5))
                 : user.streak > 0 ? '🔥' : '—';
  const strLbl   = user.streak > 0 ? `${user.streak}-win streak` : 'No streak';

  let pitchHtml = '';
  if (pitch) {
    const em = tEmoji(pitch.ticker, pitch.direction);
    const pitchLabel = pitch.company_name || pitch.ticker || '?';
    pitchHtml = `
      <div class="section-lbl">Currently pitching</div>
      <div class="pitch-card" style="background:${user.color}12;border:1px solid ${user.color}55">
        <div class="pitch-top">
          <span class="pitch-ticker">${em} ${pitchLabel}</span>
          <span class="pitch-ret ${pnlCls(pitch.pnl_usd)}">${fmtPnl(pitch.pnl_usd)}</span>
        </div>
        <div class="pitch-meta">
          ${pitch.entry_price   != null ? `<span>Entry $${pitch.entry_price.toFixed(2)}</span>` : ''}
          ${pitch.current_price != null ? `<span>Now $${pitch.current_price.toFixed(2)}</span>` : ''}
          <span>${pitch.ticker ? `${pitch.ticker} · ` : ''}${timeAgo(pitch.submitted_at)}</span>
        </div>
        <div class="pitch-quote">📩 "${pitch.raw_text || '...'}"</div>
      </div>`;
  }

  const histHtml = history.length ? `
    <div class="section-lbl">Past calls</div>
    ${history.map(h => {
      const he = tEmoji(h.ticker, h.direction);
      const histLabel = h.company_name || h.ticker || '?';
      return `
        <div class="hist-item">
          <div class="hist-top">
            <span class="hist-ticker">${he} ${histLabel}</span>
            <span class="hist-ret ${pnlCls(h.pnl_usd)}">${fmtPnl(h.pnl_usd)}</span>
          </div>
          <div class="hist-meta">
            ${h.ticker ? `${h.ticker} · ` : ''}${timeAgo(h.submitted_at)}
            ${h.entry_price   != null ? ` · $${h.entry_price.toFixed(2)}` : ''}
            ${h.current_price != null ? ` → $${h.current_price.toFixed(2)}` : ''}
          </div>
          <div class="hist-quote">"${h.raw_text || '...'}"</div>
        </div>`;
    }).join('')}` : '';

  document.getElementById('drawer-body').innerHTML = `
    <div class="drawer-top">
      <div class="drawer-user">
        ${avatarEl(user, 'drawer-avatar', 2)}
        <div>
          <div class="drawer-name">${user.display_name}</div>
          <div class="drawer-nick">"${firstName(user.display_name)}"</div>
        </div>
      </div>
      <button class="close-btn" onclick="closeDrawer()">×</button>
    </div>

    <div class="stat-grid">
      <div class="stat-box">
        <div class="stat-val ${pnlCls(user.pnl)}">${fmtPnl(user.pnl)}</div>
        <div class="stat-lbl">Total return</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">${winPct}</div>
        <div class="stat-lbl">Win rate</div>
      </div>
      <div class="stat-box">
        <div class="stat-val">${strEmoji}</div>
        <div class="stat-lbl">${strLbl}</div>
      </div>
    </div>

    ${pitchHtml}
    ${histHtml}
  `;

  document.getElementById('overlay').classList.add('open');
}

function closeDrawer() {
  S.drawer = null;
  document.getElementById('overlay').classList.remove('open');
}

function handleOverlay(e) {
  if (e.target === document.getElementById('overlay')) closeDrawer();
}

// ── Bootstrap ─────────────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('/leaderboard/data/leaderboard');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    S.data = await res.json();

    renderChips();
    renderLeaderboard();
    renderFeed();
    initChart();
  } catch (err) {
    console.error('Leaderboard load failed:', err);
    document.getElementById('lb').innerHTML =
      '<div class="empty">⚠️ Couldn\'t load data.<br>Is the server running?</div>';
  }
}

init();
</script>
