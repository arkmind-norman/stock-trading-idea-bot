[build]
builder = "dockerfile"
dockerfilePath = "deployment/Dockerfile"

[deploy]
startCommand = "uvicorn main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/health"
healthcheckTimeout = 30

[[services]]
name = "daily-job"
# Run daily after US market close — 21:00 UTC (5 PM ET)
cronSchedule = "0 21 * * 1-5"
startCommand = "python simulator/daily_job.py"
